<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" width="400" height="220">
  <rect width="400" height="220" fill="#0f1923"/>
  <!-- I-V Curve -->
  <path d="M 40,60 Q 150,58 230,90 Q 290,120 310,170" fill="none" stroke="#ef9f27" stroke-width="2"/>
  <!-- P-V Curve -->
  <path d="M 40,170 Q 100,100 170,75 Q 220,60 240,80 Q 270,110 310,170" fill="none" stroke="#1d9e75" stroke-width="2"/>
  <!-- MPP dot -->
  <circle cx="200" cy="75" r="6" fill="#ef9f27"/>
  <line x1="200" y1="75" x2="200" y2="170" stroke="#ef9f27" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="210" y="70" fill="#fac775" font-size="9" font-family="monospace">MPP</text>
  <!-- Axes -->
  <line x1="40" y1="170" x2="310" y2="170" stroke="#444441" stroke-width="1"/>
  <line x1="40" y1="60" x2="40" y2="170" stroke="#444441" stroke-width="1"/>
  <text x="175" y="190" fill="#888780" font-size="9" font-family="monospace">Voltage (V)</text>
  <text x="48" y="68" fill="#ef9f27" font-size="9" font-family="monospace">I</text>
  <text x="48" y="98" fill="#1d9e75" font-size="9" font-family="monospace">P</text>
  <!-- Legend -->
  <line x1="330" y1="90" x2="350" y2="90" stroke="#ef9f27" stroke-width="2"/>
  <text x="355" y="93" fill="#fac775" font-size="8" font-family="monospace">I-V</text>
  <line x1="330" y1="110" x2="350" y2="110" stroke="#1d9e75" stroke-width="2"/>
  <text x="355" y="113" fill="#5dcaa5" font-size="8" font-family="monospace">P-V</text>
  <text x="200" y="210" fill="#5dcaa5" font-size="11" text-anchor="middle" font-family="monospace">MPPT Solar Controller</text>
</svg>
