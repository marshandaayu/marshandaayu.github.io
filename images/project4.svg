<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" width="400" height="220">
  <rect width="400" height="220" fill="#0f1923"/>
  <!-- ECG waveform -->
  <polyline points="20,110 60,110 70,110 80,60 90,150 100,110 140,110 150,90 160,110 200,110 210,40 220,170 230,110 380,110" fill="none" stroke="#1d9e75" stroke-width="2"/>
  <!-- Scanning line -->
  <rect x="19" y="40" width="362" height="80" rx="2" fill="none" stroke="#1d9e75" stroke-width="0.5" opacity="0.2"/>
  <!-- Grid lines -->
  <g stroke="#1d9e75" stroke-width="0.3" opacity="0.15">
    <line x1="20" y1="70" x2="380" y2="70"/>
    <line x1="20" y1="90" x2="380" y2="90"/>
    <line x1="20" y1="130" x2="380" y2="130"/>
    <line x1="20" y1="150" x2="380" y2="150"/>
    <line x1="80" y1="40" x2="80" y2="170"/>
    <line x1="140" y1="40" x2="140" y2="170"/>
    <line x1="200" y1="40" x2="200" y2="170"/>
    <line x1="260" y1="40" x2="260" y2="170"/>
    <line x1="320" y1="40" x2="320" y2="170"/>
  </g>
  <text x="200" y="205" fill="#5dcaa5" font-size="11" text-anchor="middle" font-family="monospace">ECG Signal Conditioner</text>
</svg>
