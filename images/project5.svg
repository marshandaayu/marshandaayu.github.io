<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" width="400" height="220">
  <rect width="400" height="220" fill="#0f1923"/>
  <!-- PCB outline -->
  <rect x="100" y="50" width="200" height="120" rx="6" fill="#0a2012" stroke="#1d9e75" stroke-width="1.5"/>
  <!-- Traces -->
  <polyline points="120,80 160,80 160,110 200,110" fill="none" stroke="#1d9e75" stroke-width="1.5" opacity="0.7"/>
  <polyline points="120,100 140,100 140,130 220,130" fill="none" stroke="#ef9f27" stroke-width="1.5" opacity="0.7"/>
  <polyline points="250,80 270,80 270,110 280,110" fill="none" stroke="#1d9e75" stroke-width="1.5" opacity="0.7"/>
  <!-- Pads -->
  <circle cx="120" cy="80" r="5" fill="#1d9e75"/>
  <circle cx="120" cy="100" r="5" fill="#ef9f27"/>
  <circle cx="200" cy="110" r="6" fill="#0a2012" stroke="#1d9e75" stroke-width="1.5"/>
  <circle cx="250" cy="80" r="5" fill="#1d9e75"/>
  <circle cx="280" cy="110" r="5" fill="#1d9e75"/>
  <!-- Test probes -->
  <line x1="120" y1="30" x2="120" y2="75" stroke="#85b7eb" stroke-width="1.5"/>
  <line x1="250" y1="30" x2="250" y2="75" stroke="#85b7eb" stroke-width="1.5"/>
  <polygon points="120,30 115,42 125,42" fill="#378add"/>
  <polygon points="250,30 245,42 255,42" fill="#378add"/>
  <text x="200" y="205" fill="#5dcaa5" font-size="11" text-anchor="middle" font-family="monospace">PCB Testing Fixture</text>
</svg>
