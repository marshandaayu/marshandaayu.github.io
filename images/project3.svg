<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" width="400" height="220">
  <rect width="400" height="220" fill="#0f1923"/>
  <!-- Solar panel -->
  <rect x="30" y="30" width="80" height="50" rx="3" fill="#1e3a5f" stroke="#378add" stroke-width="1"/>
  <line x1="50" y1="30" x2="50" y2="80" stroke="#185fa5" stroke-width="0.5"/>
  <line x1="70" y1="30" x2="70" y2="80" stroke="#185fa5" stroke-width="0.5"/>
  <line x1="90" y1="30" x2="90" y2="80" stroke="#185fa5" stroke-width="0.5"/>
  <line x1="30" y1="50" x2="110" y2="50" stroke="#185fa5" stroke-width="0.5"/>
  <line x1="30" y1="63" x2="110" y2="63" stroke="#185fa5" stroke-width="0.5"/>
  <text x="70" y="97" fill="#85b7eb" font-size="9" text-anchor="middle" font-family="monospace">Solar Panel</text>
  <!-- MCU -->
  <rect x="155" y="70" width="90" height="60" rx="4" fill="#04342c" stroke="#1d9e75" stroke-width="1.5"/>
  <text x="200" y="97" fill="#5dcaa5" font-size="9" text-anchor="middle" font-family="monospace">ATmega328P</text>
  <text x="200" y="113" fill="#5dcaa5" font-size="9" text-anchor="middle" font-family="monospace">Low Power</text>
  <!-- LoRa -->
  <rect x="290" y="50" width="80" height="40" rx="4" fill="#1e1e3f" stroke="#534ab7" stroke-width="1"/>
  <text x="330" y="71" fill="#afa9ec" font-size="9" text-anchor="middle" font-family="monospace">LoRa</text>
  <text x="330" y="83" fill="#afa9ec" font-size="9" text-anchor="middle" font-family="monospace">SX1276</text>
  <!-- Lines -->
  <line x1="110" y1="55" x2="155" y2="90" stroke="#378add" stroke-width="1.5"/>
  <line x1="245" y1="90" x2="290" y2="70" stroke="#534ab7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Battery -->
  <rect x="155" y="155" width="90" height="35" rx="3" fill="#2a1800" stroke="#ba7517" stroke-width="1"/>
  <rect x="235" y="163" width="8" height="19" rx="2" fill="#ba7517"/>
  <text x="200" y="177" fill="#ef9f27" font-size="9" text-anchor="middle" font-family="monospace">LiPo Battery</text>
  <line x1="200" y1="130" x2="200" y2="155" stroke="#ba7517" stroke-width="1.5"/>
  <text x="200" y="210" fill="#5dcaa5" font-size="11" text-anchor="middle" font-family="monospace">IoT Environmental Logger</text>
</svg>
